<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="ui/theme.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="header">
      <img src="/icons/icon128.png" alt="Azuki" />
      <div>
        <h1>Azuki — Design Spec Extractor</h1>
        <div class="sub" data-i18n="sub">
          아즈키가 이 페이지의 디자인을 분석해 DESIGN.md를 만들어줘요.
        </div>
      </div>
      <button id="open-settings" data-i18n-title="settings" title="설정" aria-label="설정">⚙</button>
    </div>
    <div class="actions" style="margin-top: 0">
      <button id="analyze" data-i18n="analyze">이 페이지 분석하기</button>
      <button id="add" data-i18n="add" style="display: none">＋ 페이지 추가</button>
    </div>
    <div class="hint" data-i18n-html="hint">
      여러 페이지를 한 스펙으로 <b>병합</b>: 패널을 연 채 다른 페이지로 이동해
      <b>페이지 추가</b>를 누르세요. 패널은 닫히지 않아요.
    </div>
    <div id="status"></div>
    <div id="result">
      <div id="pages"></div>
      <div id="mascot"></div>
      <div id="dna"></div>
      <div id="fingerprint" title="design fingerprint"></div>
      <div id="preview"></div>
      <div class="actions">
        <button id="copy" data-i18n="copy">복사</button>
        <button id="download">DESIGN.md</button>
      </div>
      <div class="actions">
        <button id="copy-agent" data-i18n="agentCopy">에이전트 프롬프트</button>
      </div>
      <div class="actions">
        <button id="download-css">tokens.css</button>
        <button id="download-json">tokens.json</button>
        <button id="download-tw">tailwind</button>
      </div>
      <div class="actions">
        <button id="download-html">preview.html</button>
        <button id="download-shot">screenshot</button>
      </div>
      <div class="actions">
        <button id="download-passport" data-i18n="passport">디자인 여권</button>
        <button id="open-preview" data-i18n="openPreview">미리보기 열기</button>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
